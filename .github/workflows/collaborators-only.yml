name: collaborators-only

on:
  pull_request_target:
    types: [opened, reopened]

jobs:
  call-collaborators-only-workflow:
    uses: psyb0t/reusable-github-workflows/.github/workflows/collaborators-only-workflow.yml@00dcfe7beb3e92cff5cfc37f6ca73a39873a8873 # master
    with:
      close_message: "No PRs. Best security policy ever. Open an issue and I'll fix it myself."
      lock: true
